services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: aspnet_db
      MYSQL_USER: aspnet_user
      MYSQL_PASSWORD: aspnet_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  web:
    image: groupa02_web:latest
    ports:
      - "5000:8080"
    environment:
      - DATABASE_URL=mysql+pymysql://aspnet_user:aspnet_pass@db:3306/aspnet_db
      - SECRET_KEY=prod-secret-key
    networks:
      - app_network
    deploy:
      replicas: 2

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - app_network

  visualizer:
    image: dockersamples/visualizer:stable
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_network

networks:
  app_network:
    driver: overlay

volumes:
  mysql_data: