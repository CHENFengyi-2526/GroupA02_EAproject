[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:cloud_sql_proxy]
command=/cloud_sql_proxy -instances=groupa02eaproject:asia-east1:eadb=tcp:3306
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:gunicorn]
command=gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 wsgi:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
