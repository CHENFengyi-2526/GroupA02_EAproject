cat > app/templates/admin/roles.html << 'EOF'
{% extends "base.html.j2" %}

{% block title %}Role Management - ASP.NET Core Community{% endblock %}

{% block content %}
<div class="container my-4">
    <h2 class="mb-4">Role List</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Role Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for role in roles %}
            <tr>
                <td>{{ role.id }}</td>
                <td>{{ role.name }}</td>
                <td>
                    <a href="{{ url_for('admin.edit_role', id=role.id) }}" class="btn btn-sm btn-primary">Edit</a>
                    <form method="post" action="{{ url_for('admin.delete_role', id=role.id) }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this role?');">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
EOF
