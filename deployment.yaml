apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask
        image: asia-east1-docker.pkg.dev/groupa02eaproject/flask-repo/flask-app:v7
        ports:
        - containerPort: 8080
        env:
        - name: FLASK_ENV
          value: "production"
        - name: INSTANCE_CONNECTION_NAME
          value: "groupa02eaproject:asia-east1:eadb"
        - name: DB_USER
          value: "esther"
        - name: DB_NAME
          value: "eadb"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASS
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: SECRET_KEY
        - name: PUBLIC_BASE_URL          
          value: "http://34.81.14.237/"   
          requests:
            cpu: "300m"
            memory: "512Mi"

      - name: cloud-sql-proxy
        image: gcr.io/cloudsql-docker/gce-proxy:1.36.0
        command: ["/cloud_sql_proxy"]
        args:
        - "-instances=groupa02eaproject:asia-east1:eadb=tcp:3306"
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: "100m"
            memory: "200Mi"